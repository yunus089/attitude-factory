# =========================================================
# Attitude Factory – docker-compose.prod.yml
# Hostinger VPS | PostgreSQL + App + Caddy
# Usage: docker compose -f docker-compose.prod.yml up -d
# =========================================================

services:
  postgres:
    image: postgres:17-alpine
    container_name: attitude-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: attitude
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: attitude_factory
    volumes:
      - attitude_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attitude -d attitude_factory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    image: attitude-factory-app:latest
    container_name: attitude-app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      AUTH_ALLOW_SIGN_UP: "false"
      AUTH_ENFORCED: "true"
      UPLOAD_ROOT: /app/uploads
      NODE_ENV: production
      PORT: 3000
    volumes:
      - attitude_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - web

  caddy:
    image: caddy:2-alpine
    container_name: attitude-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

volumes:
  attitude_postgres_data:
  attitude_uploads:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
